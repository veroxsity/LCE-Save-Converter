name: Save Converter CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore .\LceWorldConverter.sln

      - name: Build
        run: dotnet build .\LceWorldConverter.sln -c Release --no-restore

      - name: Test
        run: dotnet test .\tests\LceWorldConverter.Tests.csproj -c Release --no-build
